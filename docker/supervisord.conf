[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 %(ENV_VNC_RESOLUTION)sx24
autorestart=true
priority=100
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb_err.log

[program:vncserver]
command=/bin/bash -c "sleep 2 && x11vnc -display :1 -forever -shared -rfbport %(ENV_VNC_PORT)s -nopw"
autorestart=true
priority=200
stdout_logfile=/var/log/supervisor/vnc.log
stderr_logfile=/var/log/supervisor/vnc_err.log

[program:novnc]
command=/bin/bash -c "sleep 3 && websockify --web=/usr/share/novnc %(ENV_NOVNC_PORT)s localhost:%(ENV_VNC_PORT)s"
autorestart=true
priority=300
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc_err.log

[program:foamagent]
command=/bin/bash -c "sleep 5 && DISPLAY=:1 /app/build/FoamAgent"
autorestart=true
priority=400
stdout_logfile=/var/log/supervisor/foamagent.log
stderr_logfile=/var/log/supervisor/foamagent_err.log
